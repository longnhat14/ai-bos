version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-bos-postgres
    environment:
      POSTGRES_USER: ai_bos
      POSTGRES_PASSWORD: ai_bos_password
      POSTGRES_DB: ai_bos
    ports:
      - '5432:5432'
    volumes:
      - ai_bos_pg_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: ai-bos-redis
    ports:
      - '6379:6379'

volumes:
  ai_bos_pg_data:
